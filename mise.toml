[tools]
python = "3.13"
uv = "latest"
node = "25"
gh = "latest"
rclone = "latest"

[env]
UV_PROJECT_ENVIRONMENT = "research/.venv"
MYCOAI_VAST_DRIVE_ROOT = "/workspace/drive"
MYCOAI_GDRIVE_REMOTE = "mydrive:mycoai-data"

[tasks.sync]
description = "Install research dependencies"
run = "uv --directory research sync"

[tasks.qdrant-up]
description = "Start Qdrant services via Compose"
run = "docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d qdrant-research"

[tasks.qdrant-down]
description = "Stop Qdrant services via Compose"
run = "docker compose -f docker-compose.yml -f docker-compose.dev.yml down"

[tasks.threshold]
description = "Run threshold experiment prepare flow"
run = "uv --directory research run python src/prepare.py --experiment threshold"

[tasks.experiment-list]
description = "List available experiments"
run = "uv --directory research run python src/run.py --experiment-list"

[tasks.backend-sync]
description = "Install backend dependencies"
run = "uv --directory backend sync --all-groups"

[tasks.frontend-install]
description = "Install frontend dependencies"
run = "pnpm --dir frontend install"

[tasks.compose-dev-up]
description = "Start development Docker Compose stack"
run = "docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d"

[tasks.compose-dev-down]
description = "Stop development Docker Compose stack"
run = "docker compose -f docker-compose.yml -f docker-compose.dev.yml down"

[tasks.compose-dev-build]
description = "Rebuild all dev Docker images"
run = "docker compose -f docker-compose.yml -f docker-compose.dev.yml build --no-cache"

[tasks.compose-dev-build-frontend]
description = "Rebuild frontend dev Docker image (no cache)"
run = "docker compose -f docker-compose.yml -f docker-compose.dev.yml build --no-cache frontend"

[tasks.compose-dev-build-backend]
description = "Rebuild backend + celery-worker dev Docker images (no cache)"
run = "docker compose -f docker-compose.yml -f docker-compose.dev.yml build --no-cache backend celery-worker"
[tasks.compose-prod-up]
description = "Start production Docker Compose stack"
run = "docker compose up -d"

[tasks.compose-prod-down]
description = "Stop production Docker Compose stack"
run = "docker compose down"

[tasks.compose-migrate]
description = "Run Alembic migrations inside containers"
run = "docker compose run --rm --profile migrate db-migrate"

[tasks.backend-lint]
description = "Run backend lint, typecheck, and tests"
run = "uv --directory backend run ruff check . && uv --directory backend run ruff format --check . && uv --directory backend run mypy src && uv --directory backend run pytest"

[tasks.frontend-lint]
description = "Run frontend lint and build checks"
run = "pnpm --dir frontend lint && pnpm --dir frontend typecheck && pnpm --dir frontend build"

[tasks.workspace-prepare]
description = "Prepare a MycoAI remote workspace"
run = "bash tools/workspace_bootstrap.sh prepare"

[tasks.workspace-smoke-check]
description = "Validate the MycoAI remote workspace"
run = "bash tools/workspace_bootstrap.sh smoke-check"

[tasks.workspace-recover]
description = "Recover a MycoAI remote workspace"
run = "bash tools/workspace_bootstrap.sh recover"

[tasks.project-init]
description = "Init full monorepo dependencies"
run = "mise install && uv --directory research sync && uv --directory backend sync --all-groups && pnpm --dir frontend install"

[tasks.dataset-sync-plan]
description = "Show dataset sync CLI help"
run = "uv run python tools/dataset_sync.py plan --help"

[tasks.dataset-sync-import]
description = "Show dataset import CLI help"
run = "uv run python tools/dataset_sync.py import --help"

[tasks.dataset-sync-export]
description = "Show dataset export CLI help"
run = "uv run python tools/dataset_sync.py export --help"

[tasks.dataset-template-zip]
description = "Create 3-strain template zip in backend uploads"
run = '''python - <<'PY'
from pathlib import Path
import csv
import shutil
import zipfile

source = Path("Dataset/original_prepared")
target_dir = Path("backend/Dataset/uploads")
tmp_root = Path("/tmp/opencode/dataset-template-zip")
staging = tmp_root / "mycoai_batch_template"
zip_path = target_dir / "mycoai_batch_template_3_strains.zip"
mapping_path = Path("Dataset/strain_to_specy.csv")

if staging.exists():
    shutil.rmtree(staging)
staging.mkdir(parents=True, exist_ok=True)
tmp_root.mkdir(parents=True, exist_ok=True)
target_dir.mkdir(parents=True, exist_ok=True)

def norm(value: str) -> str:
    return value.lower().replace(" ", "-").replace("_", "-")

canonical = {}
with mapping_path.open() as f:
    for row in csv.DictReader(f):
        canonical[norm(row["Strain"])] = row["Strain"]

strain_dirs = []
for species_dir in sorted(source.iterdir()):
    if not species_dir.is_dir():
        continue
    for strain_dir in sorted(species_dir.iterdir()):
        if strain_dir.is_dir():
            strain_dirs.append(strain_dir)

selected = strain_dirs[:3]
if len(selected) < 3:
    raise SystemExit(f"Need at least 3 strain folders in {source}")

for strain_dir in selected:
    canonical_name = canonical.get(norm(strain_dir.name), strain_dir.name)
    dest = staging / canonical_name
    dest.mkdir(parents=True, exist_ok=True)
    for image_path in sorted(strain_dir.rglob('source_*.jpg')):
        rel = image_path.relative_to(strain_dir)
        parts = rel.parts
        if len(parts) < 3:
            continue
        media = parts[0].upper()
        angle = parts[1].lower()
        suffix = image_path.stem.removeprefix('source_')
        renamed = f"{canonical_name}_{media}_{angle}_{suffix}.jpg"
        shutil.copy2(image_path, dest / renamed)

with zipfile.ZipFile(zip_path, "w", compression=zipfile.ZIP_DEFLATED) as zf:
    for path in sorted(staging.rglob("*")):
        if path.is_file():
            zf.write(path, path.relative_to(staging))

print(zip_path)
for strain_dir in selected:
    canonical_name = canonical.get(norm(strain_dir.name), strain_dir.name)
    count = sum(1 for _ in strain_dir.rglob('source_*.jpg'))
    print(f"- {canonical_name}: {count} source images")
PY'''

[tasks.gdrive-auth]
description = "Create Google Drive rclone remote"
run = "bash -lc 'if mise x -- rclone lsd mydrive: >/dev/null 2>&1; then mise x -- rclone lsd mydrive:; exit 0; fi; readarray -t GOOGLE_CREDS < <(python -c \"import json, pathlib; data=json.loads(pathlib.Path.home().joinpath(\\\"client_secret_phamthanhdat170904.json\\\").read_text())[\\\"installed\\\"]; print(data[\\\"client_id\\\"]); print(data[\\\"client_secret\\\"])\"); if [ -z \"${RCLONE_DRIVE_TOKEN:-}\" ]; then printf \"Run on local machine and export token before retrying:\n\"; printf \"rclone authorize \\\"drive\\\" \\\"%s\\\" \\\"%s\\\"\n\" \"${GOOGLE_CREDS[0]}\" \"${GOOGLE_CREDS[1]}\"; exit 1; fi; mkdir -p \"$HOME/.config/rclone\"; mise x -- rclone config create mydrive drive client_id \"${GOOGLE_CREDS[0]}\" client_secret \"${GOOGLE_CREDS[1]}\" scope drive token \"$RCLONE_DRIVE_TOKEN\" && mise x -- rclone lsd mydrive:'"

[tasks.data-sync-down]
description = "Sync target from Google Drive"
run = "bash -lc 'MYCOAI_GDRIVE_REMOTE=${MYCOAI_GDRIVE_REMOTE:-mydrive:mycoai-data}; SCOPE=${MISE_TASK_SCOPE:?usage: MISE_TASK_SCOPE=<folder> mise run data-sync-down}; mise x -- rclone sync \"$MYCOAI_GDRIVE_REMOTE/$SCOPE\" \"$SCOPE\" --progress --skip-links'"

[tasks.data-sync-up]
description = "Sync target to Google Drive"
run = "bash -lc 'MYCOAI_GDRIVE_REMOTE=${MYCOAI_GDRIVE_REMOTE:-mydrive:mycoai-data}; SCOPE=${MISE_TASK_SCOPE:?usage: MISE_TASK_SCOPE=<folder> mise run data-sync-up}; mise x -- rclone sync \"$SCOPE\" \"$MYCOAI_GDRIVE_REMOTE/$SCOPE\" --progress --skip-links'"

[tasks.weights-sync-essential]
description = "Sync fold0 EfficientNetB1_finetuned + YOLO best weights from Google Drive (non-destructive rclone copy)"
run = "bash -lc 'RCLONE=$(command -v rclone || echo $HOME/.local/share/mise/installs/rclone/1.74.3/rclone-v1.74.3-linux-amd64/rclone); REMOTE=${MYCOAI_GDRIVE_REMOTE:-mydrive:mycoai-data}; DEST=research/weights; mkdir -p \"$DEST/folds\" \"$DEST/segmentation\"; \"$RCLONE\" copy --progress --skip-links \"$REMOTE/weights/folds/fold0_EfficientNetB1_finetuned.pth\" \"$DEST/folds/\" && \"$RCLONE\" copy --progress --skip-links \"$REMOTE/weights/segmentation/yolo26_seg_best.pt\" \"$DEST/segmentation/\" && ls -lh \"$DEST/folds/fold0_EfficientNetB1_finetuned.pth\" \"$DEST/segmentation/yolo26_seg_best.pt\"'"

[tasks.install-spec-kit]
description = "Install the Specify CLI"
run = "uv tool install --force specify-cli --from git+https://github.com/github/spec-kit.git@v0.6.1"

[tasks.specify-check]
description = "Verify Spec Kit prerequisites"
run = "specify check"

[tasks.specify-init-opencode]
description = "Initialize Spec Kit for OpenCode"
run = "specify init --here --ai opencode --no-git --force"

[tasks.report-clean]
description = "Clean LaTeX render artifacts, keep .tex/figures/tables/*.zip"
run = "bash docs/graduation_report/latex/clean.sh"

[tasks.report-render]
description = "Render graduation report PDF"
run = "bash docs/graduation_report/latex/render.sh"

[tasks.report-upload]
description = "Package and upload graduation report zip to mycoai-data"
run = "bash docs/graduation_report/latex/upload.sh"
