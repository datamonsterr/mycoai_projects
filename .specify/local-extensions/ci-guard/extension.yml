schema_version: "1.0"

extension:
  id: ci-guard
  name: "CI Guard"
  version: "1.0.0"
  description: "Spec compliance gates for CI/CD with normalized command names"
  author: "Quratulain-bilal"
  repository: "https://github.com/Quratulain-bilal/spec-kit-ci-guard"
  license: "MIT"

requires:
  speckit_version: ">=0.4.0"

provides:
  commands:
    - name: speckit.ci-guard.check
      file: commands/check.md
      description: "Run spec compliance checks and report pass/fail status"
      aliases: ["speckit.ci.check"]
    - name: speckit.ci-guard.report
      file: commands/report.md
      description: "Generate requirement coverage report"
      aliases: ["speckit.ci.report"]
    - name: speckit.ci-guard.gate
      file: commands/gate.md
      description: "Configure merge gate rules"
      aliases: ["speckit.ci.gate"]
    - name: speckit.ci-guard.drift
      file: commands/drift.md
      description: "Detect spec-to-code drift"
      aliases: ["speckit.ci.drift"]

hooks:
  before_implement:
    command: speckit.ci-guard.check
    optional: true
    prompt: "Run spec compliance checks before implementation?"
    description: "Verify spec artifacts before implementation"
  after_implement:
    command: speckit.ci-guard.drift
    optional: true
    prompt: "Check spec drift after implementation?"
    description: "Detect divergence between spec and code"

tags:
  - ci-cd
  - compliance
  - quality-gate
