name: Format

on:
  push:
    branches: [main, worktree-autoresearch]
  pull_request:
    branches: [main]

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run black
        run: uv run black --check src

      - name: Run isort
        run: uv run isort --check src

      - name: Format report (black)
        if: failure()
        run: uv run black src || true

      - name: Format report (isort)
        if: failure()
        run: uv run isort src || true
