name: Lint

on:
  push:
    branches: [main, worktree-autoresearch]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run flake8
        run: uv run flake8 src

      - name: Run mypy
        run: uv run mypy src
